name: simuni_ledger
description: "A premium hardware transaction ledger tracking app with local machine intelligence."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management Architecture
  provider: ^6.1.2

  # Hardware Telemetry & Communication System Packages
  permission_handler: ^11.3.1
  flutter_sms_inbox: ^1.0.5

  # Cupertino Icons for base fallback render components
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # Visual Identity Typography System Matrix
  # Make sure the font file paths match your physical directory inside your project root
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700