name: simuni_ledger
description: "A premium hardware transaction ledger tracking app with local machine intelligence."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management Architecture
  provider: ^6.1.2

  # Database & Storage
  sqflite: ^2.3.0
  path: ^1.8.3
  flutter_secure_storage: ^9.0.0

  # Hardware Telemetry & Communication System Packages
  permission_handler: ^11.3.1
  flutter_sms_inbox: ^1.0.5

  # AI Integration
  google_generative_ai: ^0.3.0

  # Cupertino Icons for base fallback render components
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png" # <--- Double-check this matches your actual filename
  remove_alpha_ios: true