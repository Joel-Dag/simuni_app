name: simuni_app
description: "A new Flutter project."
publish_to: 'none' 
version: 1.0.0+1
environment:
  sdk: ^3.12.2


dependencies:
  flutter:
    sdk: flutter
  flutter_secure_storage: ^9.0.0   # Encrypts the Gemini API Key locally
  google_generative_ai: ^0.4.0     # Official Google Gemini SDK
  sqflite: ^2.3.0                  # SQLite local storage engine
  path: ^1.9.0
  flutter_sms_inbox: ^1.0.5                     # Simplifies database routing paths
  permission_handler: ^12.0.3
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/logo.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#0F0F12" 
  adaptive_icon_foreground: "assets/logo.png"
